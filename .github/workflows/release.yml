name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install cross-compiler
        if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: go build -ldflags="-s -w" -o kiro-cli-history-linux-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: kiro-cli-history-linux-${{ matrix.goarch }}
          path: kiro-cli-history-linux-${{ matrix.goarch }}

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goarch: amd64
          - runner: macos-14
            goarch: arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o kiro-cli-history-darwin-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: kiro-cli-history-darwin-${{ matrix.goarch }}
          path: kiro-cli-history-darwin-${{ matrix.goarch }}

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
